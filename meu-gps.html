<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GPS iGo Style</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; overflow: hidden; background: #fff; }
        
        #map { 
            height: 100vh; 
            width: 100vw; 
            position: absolute; 
            top: 0; 
            left: 0; 
            z-index: 1;
            transition: transform 0.3s ease-out;
        }

        #ui-container {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            width: 90%;
            max-width: 360px;
            transition: transform 0.3s ease;
            pointer-events: none;
        }

        .panel {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
            pointer-events: auto;
        }

        .fab {
            width: 60px;
            height: 60px;
            background: #007bff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            cursor: pointer;
            border: 4px solid white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            margin: 0 auto 10px auto;
            color: white;
            pointer-events: auto;
        }

        .panel-hidden { display: none; }

        h2 { margin: 10px 0; font-size: 18px; color: #333; }
        
        button {
            width: 100%;
            padding: 15px;
            margin-top: 10px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            color: white;
        }

        .btn-green { background-color: #28a745; }
        .btn-red { background-color: #dc3545; }

        #status-box {
            background: #f1f3f5;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 10px;
            font-size: 14px;
            color: #495057;
        }

        #speedometer {
            position: absolute;
            bottom: 30px;
            right: 20px;
            background: white;
            padding: 10px 20px;
            border-radius: 10px;
            font-family: monospace;
            font-size: 24px;
            font-weight: bold;
            color: #333;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            z-index: 999;
            border: 2px solid #333;
        }

        /* Seta indicadora no centro */
        #direction-arrow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 60px;
            height: 60px;
            z-index: 998;
            pointer-events: none;
            display: none;
        }

        #direction-arrow svg {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <!-- Seta indicando direção do carro (fica no centro) -->
    <div id="direction-arrow">
        <svg viewBox="0 0 100 100">
            <polygon points="50,10 20,90 50,70 80,90" fill="#007bff" stroke="white" stroke-width="3"/>
        </svg>
    </div>

    <div id="ui-container">
        <div id="fab" class="fab" onclick="togglePanel()">🚗</div>
        <div id="main-panel" class="panel">
            <h2>Navegador iGo</h2>
            <div id="status-box">👆 Toque no mapa para definir destino</div>

            <div id="setup-controls">
                <button class="btn-green" onclick="startGPS()">INICIAR NAVEGAÇÃO</button>
            </div>
            <div id="nav-controls" style="display:none;">
                <button class="btn-red" onclick="stopGPS()">PARAR</button>
            </div>
        </div>
    </div>

    <div id="speedometer">0 km/h</div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // 1. Inicializar Mapa
        var map = L.map('map', { 
            zoomControl: false, 
            fadeAnimation: false
        }).setView([-5.7945, -35.2110], 13);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap &copy; CARTO',
            subdomains: 'abcd',
            maxZoom: 22,
            minZoom: 3
        }).addTo(map);

        var carMarker = null;
        var destMarker = null;
        var routeLine = null;
        var watchId = null;
        var destCoords = null;
        var isNavigating = false;
        var currentHeading = 0;
        var lastValidHeading = 0;

        // 2. Interface
        function togglePanel() {
            var panel = document.getElementById('main-panel');
            if (panel.style.display === 'none') {
                panel.style.display = 'block';
            } else {
                panel.style.display = 'none';
            }
            setTimeout(() => { map.invalidateSize(); }, 300);
        }

        // 3. Definir Destino
        map.on('click', function(e) {
            destCoords = [e.latlng.lat, e.latlng.lng];
            if (destMarker) map.removeLayer(destMarker);
            if (routeLine) map.removeLayer(routeLine);
            routeLine = null;

            destMarker = L.marker(destCoords).addTo(map).bindPopup("Destino").openPopup();
            document.getElementById('status-box').innerText = "✅ Destino marcado!";
        });

        // 4. Iniciar GPS
        function startGPS() {
            if (!navigator.geolocation) return alert("GPS não suportado");
            isNavigating = true;
            document.getElementById('setup-controls').style.display = 'none';
            document.getElementById('nav-controls').style.display = 'block';
            document.getElementById('status-box').innerText = "📡 Buscando satélites...";
            document.getElementById('direction-arrow').style.display = 'block';
            togglePanel();

            watchId = navigator.geolocation.watchPosition(updatePosition, handleError, {
                enableHighAccuracy: true,
                timeout: 10000,
                maximumAge: 0
            });
        }

        // 5. Lógica de Rotação e Movimento CORRIGIDA
        function updatePosition(pos) {
            var lat = pos.coords.latitude;
            var lon = pos.coords.longitude;
            var speed = pos.coords.speed;
            var heading = pos.coords.heading;

            // Se não tem heading do GPS, calcula baseado na última posição
            if (heading === null || heading === undefined) {
                if (carMarker) {
                    var prevLatLng = carMarker.getLatLng();
                    heading = calculateBearing(prevLatLng.lat, prevLatLng.lng, lat, lon);
                } else {
                    heading = lastValidHeading;
                }
            } else {
                lastValidHeading = heading;
            }

            // Velocímetro
            var kmh = speed ? (speed * 3.6).toFixed(0) : 0;
            document.getElementById('speedometer').innerText = kmh + " km/h";

            // Criar Carro (invisível, só para controle de posição)
            if (!carMarker) {
                var carIcon = L.divIcon({
                    className: 'car-marker',
                    html: '<div style="width:20px;height:20px;background:transparent;"></div>',
                    iconSize: [20, 20],
                    iconAnchor: [10, 10]
                });
                carMarker = L.marker([lat, lon], {icon: carIcon, zIndexOffset: 1000}).addTo(map);
                // Zoom 19 para visão próxima das ruas
                map.setView([lat, lon], 19);
            } else {
                carMarker.setLatLng([lat, lon]);
            }

            if (isNavigating && heading !== null) {
                currentHeading = heading;
                
                // 1. Manter o carro no centro
                map.panTo([lat, lon], {animate: true, duration: 0.3});

                // 2. Girar o MAPA para que a direção do carro fique para CIMA
                var mapContainer = document.getElementById('map');
                mapContainer.style.transform = `rotate(${-heading}deg)`;
            }

            // Traçar Rota
            if (destCoords && !routeLine) {
                calculateRoute(lat, lon, destCoords[0], destCoords[1]);
            }
        }

        // Calcular ângulo entre dois pontos (bearing)
        function calculateBearing(lat1, lng1, lat2, lng2) {
            var dLon = (lng2 - lng1) * Math.PI / 180;
            var lat1Rad = lat1 * Math.PI / 180;
            var lat2Rad = lat2 * Math.PI / 180;
            
            var y = Math.sin(dLon) * Math.cos(lat2Rad);
            var x = Math.cos(lat1Rad) * Math.sin(lat2Rad) -
                    Math.sin(lat1Rad) * Math.cos(lat2Rad) * Math.cos(dLon);
            
            var bearing = Math.atan2(y, x) * 180 / Math.PI;
            return (bearing + 360) % 360;
        }

        async function calculateRoute(startLat, startLon, endLat, endLon) {
            try {
                var url = `https://router.project-osrm.org/route/v1/driving/${startLon},${startLat};${endLon},${endLat}?overview=full&geometries=geojson`;
                var response = await fetch(url);
                var data = await response.json();
                if (data.code === 'Ok') {
                    routeLine = L.geoJSON(data.routes[0].geometry, {
                        style: { color: '#007bff', weight: 8, opacity: 0.9 }
                    }).addTo(map);
                    document.getElementById('status-box').innerText = "✅ Rota traçada!";
                }
            } catch (e) { console.error(e); }
        }

        function handleError(err) {
            document.getElementById('status-box').innerText = "❌ Erro GPS: " + err.message;
        }

        function stopGPS() {
            isNavigating = false;
            // Reseta rotação
            document.getElementById('map').style.transform = 'rotate(0deg)';
            document.getElementById('direction-arrow').style.display = 'none';
            if (watchId) navigator.geolocation.clearWatch(watchId);
            location.reload();
        }
    </script>
</body>
</html>

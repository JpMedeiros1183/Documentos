<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GPS iGo Style</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; overflow: hidden; background: #fff; }
        
        #map { 
            height: 100vh; 
            width: 100vw; 
            position: absolute; 
            top: 0; 
            left: 0; 
            z-index: 1; 
        }

        /* Ajuste fino para rotação não bugar a tela */
        .leaflet-map-pane {
            transform-origin: center center !important;
        }

        #ui-container {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            width: 90%;
            max-width: 360px;
            transition: transform 0.3s ease;
            pointer-events: none; /* Deixa clicar no mapa através das bordas */
        }

        .panel {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
            pointer-events: auto; /* Reativa cliques no painel */
        }

        .fab {
            width: 60px;
            height: 60px;
            background: #007bff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            cursor: pointer;
            border: 4px solid white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            margin: 0 auto 10px auto;
            color: white;
            pointer-events: auto;
        }

        .panel-hidden { display: none; }

        h2 { margin: 10px 0; font-size: 18px; color: #333; }
        
        button {
            width: 100%;
            padding: 15px;
            margin-top: 10px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            color: white;
        }

        .btn-green { background-color: #28a745; }
        .btn-red { background-color: #dc3545; }

        #status-box {
            background: #f1f3f5;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 10px;
            font-size: 14px;
            color: #495057;
        }

        #speedometer {
            position: absolute;
            bottom: 30px;
            right: 20px;
            background: white;
            padding: 10px 20px;
            border-radius: 10px;
            font-family: monospace;
            font-size: 24px;
            font-weight: bold;
            color: #333;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            z-index: 999;
            border: 2px solid #333;
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <div id="ui-container">
        <div id="fab" class="fab" onclick="togglePanel()">🚗</div>
        <div id="main-panel" class="panel">
            <h2>Navegador iGo</h2>
            <div id="status-box">👆 Toque no mapa para definir destino</div>

            <div id="setup-controls">
                <button class="btn-green" onclick="startGPS()">INICIAR NAVEGAÇÃO</button>
            </div>
            <div id="nav-controls" style="display:none;">
                <button class="btn-red" onclick="stopGPS()">PARAR</button>
            </div>
        </div>
    </div>

    <div id="speedometer">0 km/h</div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // 1. Inicializar Mapa
        var map = L.map('map', { zoomControl: false, fadeAnimation: false }).setView([-5.7945, -35.2110], 13);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap &copy; CARTO',
            subdomains: 'abcd',
            maxZoom: 19
        }).addTo(map);

        var carMarker = null;
        var destMarker = null;
        var routeLine = null;
        var watchId = null;
        var destCoords = null;
        var isNavigating = false;

        // 2. Interface
        function togglePanel() {
            var panel = document.getElementById('main-panel');
            if (panel.style.display === 'none') {
                panel.style.display = 'block';
            } else {
                panel.style.display = 'none';
            }
            setTimeout(() => { map.invalidateSize(); }, 300);
        }

        // 3. Definir Destino
        map.on('click', function(e) {
            destCoords = [e.latlng.lat, e.latlng.lng];
            if (destMarker) map.removeLayer(destMarker);
            if (routeLine) map.removeLayer(routeLine);

            destMarker = L.marker(destCoords).addTo(map).bindPopup("Destino").openPopup();
            document.getElementById('status-box').innerText = "✅ Destino marcado!";
        });

        // 4. Iniciar GPS
        function startGPS() {
            if (!navigator.geolocation) return alert("GPS não suportado");
            isNavigating = true;
            document.getElementById('setup-controls').style.display = 'none';
            document.getElementById('nav-controls').style.display = 'block';
            document.getElementById('status-box').innerText = "📡 Buscando satélites...";
            togglePanel(); // Minimiza

            watchId = navigator.geolocation.watchPosition(updatePosition, handleError, {
                enableHighAccuracy: true,
                timeout: 10000,
                maximumAge: 0
            });
        }

        // 5. Lógica de Rotação e Movimento
        function updatePosition(pos) {
            var lat = pos.coords.latitude;
            var lon = pos.coords.longitude;
            var speed = pos.coords.speed;
            // Heading (direção) vem em graus (0 a 360). Se for null, mantém o anterior
            var heading = pos.coords.heading !== null ? pos.coords.heading : 0; 

            // Velocímetro
            var kmh = speed ? (speed * 3.6).toFixed(0) : 0;
            document.getElementById('speedometer').innerText = kmh + " km/h";

            // Criar Carro
            if (!carMarker) {
                // Ícone apontando para CIMA (0 graus)
                var carIcon = L.icon({
                    iconUrl: 'https://cdn-icons-png.flaticon.com/512/3097/3097180.png', 
                    iconSize: [40, 40],
                    iconAnchor: [20, 20]
                });
                carMarker = L.marker([lat, lon], {icon: carIcon}).addTo(map);
                map.setView([lat, lon], 17); // Zoom próximo
            } else {
                carMarker.setLatLng([lat, lon]);
            }

            if (isNavigating) {
                // 1. Manter o carro sempre no centro da tela
                map.panTo([lat, lon], {animate: true, duration: 0.5});

                // 2. Girar o MAPA (Sentido anti-horário baseado na direção)
                // Ex: Se estou indo para Leste (90deg), o mapa gira -90deg para o Leste ficar em cima
                var mapPane = map.getPane('mapPane');
                mapPane.style.transform = `translateZ(0) rotate(${-heading}deg)`;

                // 3. Girar o CARRO (Sentido horário para compensar e ficar reto)
                carMarker.setRotationAngle(heading);

                // 4. Girar o DESTINO (Para não ficar de cabeça para baixo)
                if (destMarker) {
                    destMarker.setRotationAngle(heading);
                }
            }

            // Traçar Rota
            if (destCoords && !routeLine) {
                calculateRoute(lat, lon, destCoords[0], destCoords[1]);
            }
        }

        async function calculateRoute(startLat, startLon, endLat, endLon) {
            try {
                var url = `https://router.project-osrm.org/route/v1/driving/${startLon},${startLat};${endLon},${endLat}?overview=full&geometries=geojson`;
                var response = await fetch(url);
                var data = await response.json();
                if (data.code === 'Ok') {
                    routeLine = L.geoJSON(data.routes[0].geometry, {
                        style: { color: '#007bff', weight: 6 }
                    }).addTo(map);
                    document.getElementById('status-box').innerText = "✅ Rota traçada!";
                }
            } catch (e) { console.error(e); }
        }

        function handleError(err) {
            document.getElementById('status-box').innerText = "❌ Erro GPS: " + err.message;
        }

        function stopGPS() {
            isNavigating = false;
            // Reseta rotação
            map.getPane('mapPane').style.transform = 'translateZ(0) rotate(0deg)';
            if (watchId) navigator.geolocation.clearWatch(watchId);
            location.reload();
        }
    </script>
</body>
</html>

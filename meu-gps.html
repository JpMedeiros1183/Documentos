<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GPS com Pesquisa</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; overflow: hidden; background: #fff; }
        
        #map { 
            height: 100vh; 
            width: 100vw; 
            position: absolute; 
            top: 0; 
            left: 0; 
            z-index: 1; 
        }

        .leaflet-map-pane {
            transform-origin: center center !important;
        }

        #ui-container {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            width: 90%;
            max-width: 380px;
            transition: transform 0.3s ease;
            pointer-events: none;
        }

        .panel {
            background: white;
            border-radius: 15px;
            padding: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
            pointer-events: auto;
            max-height: 80vh;
            overflow-y: auto;
        }

        .fab {
            width: 60px;
            height: 60px;
            background: #007bff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            cursor: pointer;
            border: 4px solid white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            margin: 0 auto 10px auto;
            color: white;
            pointer-events: auto;
        }

        .panel-hidden { display: none; }

        h2 { margin: 10px 0; font-size: 18px; color: #333; }
        
        /* Estilo da Barra de Pesquisa */
        .search-box {
            display: flex;
            gap: 5px;
            margin-bottom: 10px;
        }
        .search-input {
            flex: 1;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
        }
        .search-btn {
            padding: 12px 15px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        /* Lista de Resultados */
        #search-results {
            text-align: left;
            max-height: 150px;
            overflow-y: auto;
            margin-bottom: 10px;
            border: 1px solid #eee;
            border-radius: 8px;
            display: none;
        }
        .result-item {
            padding: 10px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
            font-size: 13px;
            color: #333;
        }
        .result-item:hover {
            background: #f0f0f0;
        }
        .result-item:last-child {
            border-bottom: none;
        }

        button.action-btn {
            width: 100%;
            padding: 15px;
            margin-top: 10px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            color: white;
        }

        .btn-green { background-color: #28a745; }
        .btn-red { background-color: #dc3545; }
        .btn-info { background-color: #6c757d; font-size: 14px; }

        #status-box {
            background: #f1f3f5;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 10px;
            font-size: 14px;
            color: #495057;
        }

        #speedometer {
            position: absolute;
            bottom: 30px;
            right: 20px;
            background: white;
            padding: 10px 20px;
            border-radius: 10px;
            font-family: monospace;
            font-size: 24px;
            font-weight: bold;
            color: #333;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            z-index: 999;
            border: 2px solid #333;
        }

        /* Loading Spinner */
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #007bff;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: none;
            margin: 10px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="map"></div>

    <div id="ui-container">
        <div id="fab" class="fab" onclick="togglePanel()"></div>
        <div id="main-panel" class="panel">
            <h2>📍 Navegador GPS</h2>
            
            <!-- BARRA DE PESQUISA -->
            <div class="search-box">
                <input type="text" id="search-input" class="search-input" placeholder="Ex: Shopping, Rua, Posto...">
                <button class="search-btn" onclick="searchAddress()">🔍</button>
            </div>
            <div id="loader" class="loader"></div>
            <div id="search-results"></div>
            <!-- FIM BARRA DE PESQUISA -->

            <div id="status-box">👆 Toque no mapa ou pesquise acima</div>

            <div id="setup-controls">
                <button class="btn-green" onclick="startGPS()">INICIAR NAVEGAÇÃO</button>
                <button class="btn-info" onclick="alert('1. Pesquise um endereço ou toque no mapa.\n2. Clique em Iniciar Navegação.\n3. O mapa girará e seguirá você.')">❓ Ajuda</button>
            </div>
            <div id="nav-controls" style="display:none;">
                <button class="btn-red" onclick="stopGPS()">PARAR</button>
            </div>
        </div>
    </div>

    <div id="speedometer">0 km/h</div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // 1. Inicializar Mapa
        var map = L.map('map', { zoomControl: false, fadeAnimation: false }).setView([-5.7945, -35.2110], 13);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap &copy; CARTO',
            subdomains: 'abcd',
            maxZoom: 19
        }).addTo(map);

        var carMarker = null;
        var destMarker = null;
        var routeLine = null;
        var watchId = null;
        var destCoords = null;
        var isNavigating = false;

        // 2. Interface
        function togglePanel() {
            var panel = document.getElementById('main-panel');
            if (panel.style.display === 'none') {
                panel.style.display = 'block';
            } else {
                panel.style.display = 'none';
            }
            setTimeout(() => { map.invalidateSize(); }, 300);
        }

        // 3. PESQUISA DE ENDEREÇOS (NOVO)
        async function searchAddress() {
            var query = document.getElementById('search-input').value;
            if (!query) return alert("Digite algo para pesquisar!");

            var loader = document.getElementById('loader');
            var resultsDiv = document.getElementById('search-results');
            
            loader.style.display = 'block';
            resultsDiv.style.display = 'none';
            resultsDiv.innerHTML = '';

            try {
                // Adiciona "Brasil" para melhorar a busca se não estiver especificado
                if (!query.toLowerCase().includes('brasil')) {
                    query += ", Brasil";
                }

                var response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&limit=5`);
                var data = await response.json();

                loader.style.display = 'none';

                if (data.length > 0) {
                    resultsDiv.style.display = 'block';
                    data.forEach(item => {
                        var div = document.createElement('div');
                        div.className = 'result-item';
                        // Tenta pegar um nome mais amigável
                        var displayName = item.name || item.display_name.split(',')[0];
                        div.innerText = displayName;
                        div.onclick = () => selectDestination(item.lat, item.lon, item.display_name);
                        resultsDiv.appendChild(div);
                    });
                } else {
                    resultsDiv.style.display = 'block';
                    resultsDiv.innerHTML = '<div class="result-item">Nenhum resultado encontrado.</div>';
                }
            } catch (e) {
                loader.style.display = 'none';
                alert("Erro na conexão de pesquisa. Verifique sua internet.");
            }
        }

        // Selecionar destino da pesquisa
        function selectDestination(lat, lon, name) {
            destCoords = [parseFloat(lat), parseFloat(lon)];
            
            if (destMarker) map.removeLayer(destMarker);
            if (routeLine) map.removeLayer(routeLine);

            destMarker = L.marker(destCoords).addTo(map)
                .bindPopup("📍 " + name)
                .openPopup();
            
            map.setView(destCoords, 15);
            
            document.getElementById('search-results').style.display = 'none';
            document.getElementById('status-box').innerText = "✅ Destino definido: " + name.split(',')[0];
            document.getElementById('status-box').style.background = "#d4edda";
        }

        // 4. Definir Destino pelo Toque
        map.on('click', function(e) {
            destCoords = [e.latlng.lat, e.latlng.lng];
            if (destMarker) map.removeLayer(destMarker);
            if (routeLine) map.removeLayer(routeLine);

            destMarker = L.marker(destCoords).addTo(map).bindPopup("Destino").openPopup();
            document.getElementById('status-box').innerText = "✅ Destino marcado no mapa!";
            document.getElementById('status-box').style.background = "#d4edda";
            document.getElementById('search-results').style.display = 'none';
        });

        // 5. Iniciar GPS
        function startGPS() {
            if (!navigator.geolocation) return alert("GPS não suportado");
            isNavigating = true;
            document.getElementById('setup-controls').style.display = 'none';
            document.getElementById('nav-controls').style.display = 'block';
            document.getElementById('status-box').innerText = "📡 Buscando satélites...";
            togglePanel();

            watchId = navigator.geolocation.watchPosition(updatePosition, handleError, {
                enableHighAccuracy: true,
                timeout: 10000,
                maximumAge: 0
            });
        }

        // 6. Lógica de Rotação e Movimento
        function updatePosition(pos) {
            var lat = pos.coords.latitude;
            var lon = pos.coords.longitude;
            var speed = pos.coords.speed;
            var heading = pos.coords.heading !== null ? pos.coords.heading : 0;

            var kmh = speed ? (speed * 3.6).toFixed(0) : 0;
            document.getElementById('speedometer').innerText = kmh + " km/h";

            if (!carMarker) {
                var carIcon = L.icon({
                    iconUrl: 'https://cdn-icons-png.flaticon.com/512/3097/3097180.png', 
                    iconSize: [40, 40],
                    iconAnchor: [20, 20]
                });
                carMarker = L.marker([lat, lon], {icon: carIcon}).addTo(map);
                map.setView([lat, lon], 17);
            } else {
                carMarker.setLatLng([lat, lon]);
            }

            if (isNavigating) {
                map.panTo([lat, lon], {animate: true, duration: 0.5});

                var mapPane = map.getPane('mapPane');
                mapPane.style.transform = `translateZ(0) rotate(${-heading}deg)`;

                carMarker.setRotationAngle(heading);
                if (destMarker) {
                    destMarker.setRotationAngle(heading);
                }
            }

            if (destCoords && !routeLine) {
                calculateRoute(lat, lon, destCoords[0], destCoords[1]);
            }
        }

        async function calculateRoute(startLat, startLon, endLat, endLon) {
            try {
                var url = `https://router.project-osrm.org/route/v1/driving/${startLon},${startLat};${endLon},${endLat}?overview=full&geometries=geojson`;
                var response = await fetch(url);
                var data = await response.json();
                if (data.code === 'Ok') {
                    routeLine = L.geoJSON(data.routes[0].geometry, {
                        style: { color: '#007bff', weight: 6 }
                    }).addTo(map);
                    document.getElementById('status-box').innerText = "✅ Rota traçada!";
                    map.fitBounds(routeLine.getBounds(), {padding: [50, 50]});
                }
            } catch (e) { console.error(e); }
        }

        function handleError(err) {
            document.getElementById('status-box').innerText = "❌ Erro GPS: " + err.message;
        }

        function stopGPS() {
            isNavigating = false;
            map.getPane('mapPane').style.transform = 'translateZ(0) rotate(0deg)';
            if (watchId) navigator.geolocation.clearWatch(watchId);
            location.reload();
        }

        // Permitir buscar apertando Enter
        document.getElementById('search-input').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                searchAddress();
            }
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GPS Navigator</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; overflow: hidden; background: #000; }

        #map { height: 100vh; width: 100vw; position: absolute; top: 0; left: 0; z-index: 1; }

        /* ── Seta do carro — fixa na tela, sempre para cima ── */
        #car-arrow {
            position: absolute;
            z-index: 500;
            pointer-events: none;
            transform: translate(-50%, -50%);
            display: none;
        }
        #car-arrow svg { display: block; filter: drop-shadow(0 2px 6px rgba(0,0,0,0.4)); }

        /* ── Painel superior ── */
        #top-bar {
            position: absolute;
            top: 16px; left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            width: calc(100% - 32px);
            max-width: 380px;
            display: flex; flex-direction: column; gap: 10px;
            pointer-events: none;
        }
        #top-bar > * { pointer-events: auto; }

        /* Busca */
        #search-box {
            background: rgba(255,255,255,0.97);
            backdrop-filter: blur(12px);
            border-radius: 14px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.18);
            overflow: hidden;
        }
        #search-row {
            display: flex; align-items: center;
            padding: 4px 4px 4px 14px; gap: 6px;
        }
        #search-input {
            flex: 1; border: none; outline: none;
            font-size: 14px; font-family: inherit;
            color: #111; background: transparent; padding: 8px 0;
        }
        #search-input::placeholder { color: #aaa; }
        #btn-search {
            background: #0a84ff; border: none; border-radius: 10px;
            width: 36px; height: 36px; color: white; font-size: 16px;
            cursor: pointer; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
        }
        #search-results { display: none; border-top: 1px solid #eee; max-height: 200px; overflow-y: auto; }
        .sri {
            padding: 11px 14px; font-size: 13px; color: #222;
            cursor: pointer; border-bottom: 1px solid #f0f0f0; line-height: 1.3;
        }
        .sri:last-child { border-bottom: none; }
        .sri:active { background: #f5f5f5; }
        #search-status { padding: 10px 14px; font-size: 13px; color: #888; display: none; }

        /* Status */
        #status-card {
            background: rgba(255,255,255,0.97);
            backdrop-filter: blur(12px);
            border-radius: 16px; padding: 13px 16px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.18);
            display: flex; align-items: center; gap: 10px;
        }
        #status-icon { font-size: 20px; flex-shrink: 0; }
        #status-text  { font-size: 13px; color: #222; font-weight: 500; line-height: 1.3; }

        .btn {
            border: none; border-radius: 14px; padding: 14px;
            font-size: 15px; font-weight: 700; cursor: pointer;
            color: white; width: 100%;
            transition: transform 0.1s, opacity 0.1s;
        }
        .btn:active { transform: scale(0.97); opacity: 0.9; }
        .btn-blue { background: #0a84ff; box-shadow: 0 4px 16px rgba(10,132,255,0.35); }
        .btn-red  { background: #ff3b30; box-shadow: 0 4px 16px rgba(255,59,48,0.35); display: none; }

        /* ── Painel inferior ── */
        #bottom-bar {
            position: absolute; bottom: 0; left: 0; right: 0;
            z-index: 1000;
            display: flex; align-items: flex-end; justify-content: space-between;
            padding: 0 16px 32px; pointer-events: none;
        }
        .hud-card {
            background: rgba(255,255,255,0.97);
            backdrop-filter: blur(12px);
            border-radius: 16px; padding: 10px 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            text-align: center; pointer-events: auto;
        }
        .hud-value { font-size: 28px; font-weight: 800; color: #111; line-height: 1; font-variant-numeric: tabular-nums; }
        .hud-label { font-size: 10px; color: #999; font-weight: 700; letter-spacing: 1.2px; margin-top: 3px; text-transform: uppercase; }
        #speedometer { min-width: 86px; }
        #route-info  { min-width: 110px; display: none; }

        #btn-center {
            background: rgba(255,255,255,0.97); backdrop-filter: blur(12px);
            border: none; border-radius: 50%; width: 50px; height: 50px;
            font-size: 20px; cursor: pointer;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15); pointer-events: auto;
            transition: transform 0.1s; display: none;
            align-items: center; justify-content: center;
        }
        #btn-center.visible { display: flex; }
        #btn-center:active { transform: scale(0.9); }

        /* Toast */
        #toast {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(0.85);
            z-index: 2000; background: white; border-radius: 22px;
            padding: 32px 40px; text-align: center;
            box-shadow: 0 24px 64px rgba(0,0,0,0.22);
            opacity: 0; pointer-events: none;
            transition: all 0.35s cubic-bezier(.34,1.56,.64,1);
        }
        #toast.show { opacity: 1; transform: translate(-50%, -50%) scale(1); pointer-events: auto; }
        #toast h2 { font-size: 26px; margin-bottom: 6px; }
        #toast p  { color: #666; font-size: 14px; margin-bottom: 20px; }
        #toast button {
            background: #0a84ff; color: white; border: none;
            border-radius: 12px; padding: 13px 32px;
            font-size: 15px; font-weight: 700; cursor: pointer;
        }

        .leaflet-control-zoom { display: none !important; }
    </style>
</head>
<body>

<div id="map"></div>

<!-- Seta fixa na tela (nunca gira) -->
<div id="car-arrow">
    <svg width="52" height="52" viewBox="0 0 52 52">
        <circle cx="26" cy="26" r="24" fill="white" stroke="#0a84ff" stroke-width="2.5"/>
        <polygon points="26,10 16,40 26,32 36,40" fill="#0a84ff"/>
    </svg>
</div>

<!-- UI (nunca gira) -->
<div id="top-bar">
    <div id="search-box">
        <div id="search-row">
            <input id="search-input" type="text" placeholder="Buscar endereço com número..." autocomplete="off"
                onkeydown="if(event.key==='Enter') searchAddress()" />
            <button id="btn-search" onclick="searchAddress()">🔍</button>
        </div>
        <div id="search-status"></div>
        <div id="search-results"></div>
    </div>
    <div id="status-card">
        <span id="status-icon">🗺️</span>
        <span id="status-text">Busque um endereço ou toque no mapa</span>
    </div>
    <button id="btn-start" class="btn btn-blue" onclick="startGPS()">▶ INICIAR NAVEGAÇÃO</button>
    <button id="btn-stop"  class="btn btn-red"  onclick="stopGPS()">⏹ PARAR NAVEGAÇÃO</button>
</div>

<div id="bottom-bar">
    <div id="speedometer" class="hud-card">
        <div class="hud-value" id="speed-value">0</div>
        <div class="hud-label">km/h</div>
    </div>
    <button id="btn-center" onclick="resumeFollow()">📍</button>
    <button id="btn-calib" onclick="openCalibration()" title="Calibrar bússola" style="
        background:rgba(255,255,255,0.97); backdrop-filter:blur(12px);
        border:none; border-radius:50%; width:50px; height:50px; font-size:20px;
        cursor:pointer; box-shadow:0 4px 20px rgba(0,0,0,0.15); pointer-events:auto;
        display:none; align-items:center; justify-content:center;">🧭</button>
    <div id="route-info" class="hud-card">
        <div class="hud-value" id="dist-value">—</div>
        <div class="hud-label">do destino</div>
    </div>
</div>

<div id="toast">
    <h2>🎉 Chegou!</h2>
    <p>Você chegou ao seu destino.</p>
    <button onclick="dismissToast()">OK</button>
</div>

<!-- Leaflet core -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!--
  Leaflet.Rotate — rotaciona bearing do mapa nativamente.
  setBearing(graus) gira os tiles, labels e rota como um GPS real:
  - labels ficam sempre legíveis (o plugin contra-rotaciona o texto)
  - gestos de toque funcionam normalmente
  - sem distorção de cantos
-->
<script src="https://unpkg.com/leaflet-rotate@0.2.8/dist/leaflet-rotate-src.js"></script>

<script>
// ── Mapa com suporte a rotate ──────────────────────────────
var map = L.map('map', {
    rotate: true,           // ativa o plugin leaflet-rotate
    bearing: 0,             // norte para cima no início
    zoomControl: false,
    fadeAnimation: false
}).setView([-5.7945, -35.2110], 16);

L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; OpenStreetMap &copy; CARTO',
    subdomains: 'abcd',
    maxZoom: 22, minZoom: 3
}).addTo(map);

// ── Estado ────────────────────────────────────────────────
var destMarker      = null;
var destCoords      = null;
var routeLine       = null;
var watchId         = null;
var isNavigating    = false;
var isFollowing     = true;
var lastPos         = null;
var lastHeading     = 0;
var arrivedNotified = false;
var carArrowEl      = document.getElementById('car-arrow');

// ── Sensores de orientação (giroscópio + magnetômetro) ────
var sensorHeading    = null;
var sensorActive     = false;
var compassOffset    = 0;   // offset de calibração (declinação magnética + manual)
var declinationFetched = false;

// Carregar offset salvo
try { compassOffset = parseFloat(localStorage.getItem('compassOffset') || '0') || 0; } catch(e){}

// ── Declinação magnética (NOAA World Magnetic Model) ──────
// Busca automaticamente na primeira fix de GPS.
// A declinação em Tibau do Sul/RN é aprox. -21° (varia com o ano).
// Corrige o azimute do magnetômetro para o norte geográfico real.
async function fetchDeclination(lat, lon) {
    if (declinationFetched) return;
    declinationFetched = true;
    try {
        var today = new Date();
        var url = 'https://www.ngdc.noaa.gov/geomag-web/calculators/calculateDeclination'
            + '?lat1=' + lat.toFixed(4)
            + '&lon1=' + lon.toFixed(4)
            + '&startYear='  + today.getFullYear()
            + '&startMonth=' + (today.getMonth() + 1)
            + '&startDay='   + today.getDate()
            + '&resultFormat=json';

        var data = await fetch(url).then(r => r.json());
        var decl = data.result && data.result[0] && data.result[0].declination;

        if (decl !== undefined && !isNaN(decl)) {
            // declinação negativa = norte mag está a OESTE do norte geog.
            // Para corrigir o azimute: heading_verdadeiro = heading_mag + declinação
            compassOffset = decl;
            try { localStorage.setItem('compassOffset', compassOffset); } catch(e) {}
            setStatus('🧭', 'Declinação: ' + decl.toFixed(1) + '° — bússola corrigida');
            setTimeout(function() {
                if (isNavigating) setStatus('🚗', 'GPS ativo — navegando');
            }, 3000);
        }
    } catch(e) {
        console.warn('Declinação magnética não disponível, usando offset salvo.');
    }
}

function startSensors() {
    if (typeof DeviceOrientationEvent !== 'undefined' &&
        typeof DeviceOrientationEvent.requestPermission === 'function') {
        DeviceOrientationEvent.requestPermission()
            .then(function(state) { if (state === 'granted') bindOrientation(); })
            .catch(console.error);
    } else {
        bindOrientation();
    }
}

function bindOrientation() {
    var evtAbsolute = 'ondeviceorientationabsolute' in window;
    window.addEventListener(
        evtAbsolute ? 'deviceorientationabsolute' : 'deviceorientation',
        onOrientation, true
    );
}

function onOrientation(e) {
    var alpha = e.alpha, beta = e.beta, gamma = e.gamma;
    if (alpha === null || alpha === undefined) return;

    // iOS: webkitCompassHeading já é azimute compensado pelo hardware
    if (e.webkitCompassHeading !== undefined && e.webkitCompassHeading !== null) {
        sensorHeading = (e.webkitCompassHeading + compassOffset + 360) % 360;
        sensorActive  = true;
        return;
    }

    // Android — compensação de tilt para qualquer orientação do celular.
    //
    // O padrão W3C define os eixos assim:
    //   alpha = yaw   (rotação em torno de Z, 0–360°)
    //   beta  = pitch (inclinação frente/trás, -180..180°)
    //   gamma = roll  (inclinação lateral, -90..90°)
    //
    // Celular DEITADO (paisagem/flat): beta≈0, gamma≈0 → alpha = azimute direto
    // Celular EM PÉ (retrato):        beta≈90           → eixos trocam
    //
    // A fórmula correta usa a matriz de rotação completa para projetar
    // o vetor [0,1,0] (norte no plano do dispositivo) no plano horizontal,
    // levando em conta a orientação atual da tela.

    var aRad = alpha * Math.PI / 180;
    var bRad = beta  * Math.PI / 180;
    var gRad = gamma * Math.PI / 180;

    var sinA = Math.sin(aRad), cosA = Math.cos(aRad);
    var sinB = Math.sin(bRad), cosB = Math.cos(bRad);
    var sinG = Math.sin(gRad), cosG = Math.cos(gRad);

    // Componentes do vetor norte após rotação ZXY completa
    var Vx = cosA * sinG * sinB + sinA * cosG * sinB - cosA * cosB * sinG + sinA * sinG;
    var Vy = sinA * sinG * sinB - cosA * cosG * sinB + sinA * cosB * sinG + cosA * sinG;

    // Detectar orientação da tela para corrigir eixos
    var orient = (screen.orientation && screen.orientation.angle) ||
                 window.orientation || 0;

    var heading;
    if (Math.abs(orient) === 90 || Math.abs(orient) === 270) {
        // Paisagem
        heading = Math.atan2(Vy, Vx) * 180 / Math.PI;
    } else {
        // Retrato (modo normal do S23 em pé)
        // Em retrato, beta≈90 — trocar papel de beta e gamma
        var Nx =  cosA * sinB + sinA * cosB * sinG;
        var Ny = -sinA * sinB + cosA * cosB * sinG;
        heading = Math.atan2(-Nx, Ny) * 180 / Math.PI;
    }

    if (heading < 0) heading += 360;

    sensorHeading = (heading + compassOffset + 360) % 360;
    sensorActive  = true;
}

// ── Fusão inteligente: GPS heading em movimento, bússola parado ──
// Quando o carro está acima de 8 km/h o GPS heading é mais fiel
// (sem interferência magnética do motor/carroceria).
// Abaixo disso a bússola é melhor pois o GPS heading fica instável.
var lastGpsHeading = null;
var lastGpsSpeed   = 0;

function getFusedHeading(gpsHeading, gpsSpeed) {
    lastGpsSpeed = gpsSpeed || 0;
    if (gpsHeading !== null && !isNaN(gpsHeading)) lastGpsHeading = gpsHeading;

    var kmh = lastGpsSpeed * 3.6;

    if (kmh >= 8 && lastGpsHeading !== null) {
        // Em movimento: GPS heading — não sofre interferência magnética
        return lastGpsHeading;
    } else if (sensorActive && sensorHeading !== null) {
        // Parado ou devagar: bússola + giroscópio
        return sensorHeading;
    } else if (lastGpsHeading !== null) {
        return lastGpsHeading;
    }
    return null;
}

// Filtro de suavização exponencial
var smoothHeading = 0;
function smoothAngle(current, target, factor) {
    var diff = ((target - current + 540) % 360) - 180;
    return (current + diff * factor + 360) % 360;
}

// ── Calibração de bússola ─────────────────────────────────
// Permite corrigir o erro sistemático do magnetômetro.
// O usuário aponta o carro para o norte, toca "Calibrar norte"
// e o app salva o offset necessário.
function openCalibration() {
    var cur = sensorHeading !== null ? sensorHeading : 0;
    var offset = prompt(
        'CALIBRAÇÃO DA BÚSSOLA\n\n' +
        'Aponte o celular para o NORTE geográfico, depois toque OK.\n\n' +
        'Leitura atual da bússola: ' + Math.round(cur) + '°\n' +
        'Offset atual: ' + Math.round(compassOffset) + '°\n\n' +
        'Digite um offset manual (ou deixe 0 para auto-calibrar apontando para o norte):',
        '0'
    );
    if (offset === null) return;
    var val = parseFloat(offset);
    if (!isNaN(val)) {
        compassOffset = val;
    } else {
        // Auto: offset = quanto falta para chegar a 0 (norte)
        compassOffset = (360 - (cur - compassOffset)) % 360;
        if (compassOffset > 180) compassOffset -= 360;
    }
    try { localStorage.setItem('compassOffset', compassOffset); } catch(e){}
    setStatus('🧭', 'Bússola calibrada. Offset: ' + Math.round(compassOffset) + '°');
}

// ── Ícone de destino ──────────────────────────────────────
var destIcon = L.divIcon({
    className: '',
    html: '<div style="font-size:30px;line-height:1">📍</div>',
    iconSize: [30, 34], iconAnchor: [15, 34]
});

// ── Posicionar seta na tela ───────────────────────────────
// O plugin cuida da rotação do mapa; a seta fica fixa na
// posição de pixel correspondente ao carro, sempre para cima.
function updateCarArrow(lat, lon) {
    var pt = map.latLngToContainerPoint([lat, lon]);
    carArrowEl.style.left    = pt.x + 'px';
    carArrowEl.style.top     = pt.y + 'px';
    carArrowEl.style.display = 'block';
}

// ── Definir destino (clique no mapa) ──────────────────────
map.on('click', function(e) {
    destCoords = [e.latlng.lat, e.latlng.lng];
    if (destMarker) map.removeLayer(destMarker);
    destMarker = L.marker(destCoords, {icon: destIcon}).addTo(map);
    clearRoute();
    arrivedNotified = false;
    document.getElementById('route-info').style.display = 'none';
    setStatus('✅', 'Destino marcado! Toque em Iniciar.');
    if (isNavigating && lastPos) calculateRoute(lastPos.lat, lastPos.lon);
});

map.on('dragstart', function() {
    isFollowing = false;
    document.getElementById('btn-center').classList.add('visible');
});

// ── GPS ───────────────────────────────────────────────────
function startGPS() {
    if (!navigator.geolocation) return alert('GPS não disponível.');
    isNavigating = true; isFollowing = true; arrivedNotified = false;
    document.getElementById('btn-start').style.display = 'none';
    document.getElementById('btn-stop').style.display  = 'block';
    document.getElementById('btn-calib').style.display = 'flex';
    setStatus('📡', 'Aguardando sinal GPS...');

    // Ativar sensores de orientação (giroscópio/magnetômetro)
    startSensors();

    watchId = navigator.geolocation.watchPosition(onPosition, onGPSError, {
        enableHighAccuracy: true, timeout: 15000, maximumAge: 0
    });

    // Loop de atualização suave do bearing (~30fps)
    // Atualiza o mapa com o heading dos sensores continuamente,
    // não só quando o GPS devolve posição (que é lento, 1-2s)
    startBearingLoop();
}

function stopGPS() {
    isNavigating = false;
    if (watchId) { navigator.geolocation.clearWatch(watchId); watchId = null; }
    stopBearingLoop();
    window.removeEventListener('deviceorientationabsolute', onOrientation, true);
    window.removeEventListener('deviceorientation',         onOrientation, true);
    sensorActive = false; sensorHeading = null;
    map.setBearing(0);
    carArrowEl.style.display = 'none';
    document.getElementById('btn-stop').style.display  = 'none';
    document.getElementById('btn-start').style.display = 'block';
    document.getElementById('btn-calib').style.display = 'none';
    document.getElementById('btn-center').classList.remove('visible');
    document.getElementById('speed-value').textContent = '0';
    document.getElementById('route-info').style.display = 'none';
    clearRoute();
    lastPos = null;
    setStatus('🗺️', 'Busque um endereço ou toque no mapa');
}

function resumeFollow() {
    isFollowing = true;
    document.getElementById('btn-center').classList.remove('visible');
    if (lastPos) {
        map.setView([lastPos.lat, lastPos.lon], map.getZoom(), {animate: true});
        map.setBearing(lastHeading);
        updateCarArrow(lastPos.lat, lastPos.lon);
    }
}

// ── Callback GPS ──────────────────────────────────────────
function onPosition(pos) {
    var lat   = pos.coords.latitude;
    var lon   = pos.coords.longitude;
    var speed = pos.coords.speed || 0;
    var gpsH  = (pos.coords.heading !== null && !isNaN(pos.coords.heading))
                ? pos.coords.heading : null;

    // Na primeira posição: buscar declinação magnética da NOAA para esta lat/lon
    if (!declinationFetched) fetchDeclination(lat, lon);

    // Anti-jitter: GPS heading só é confiável se movendo
    if (lastPos && haversine(lastPos.lat, lastPos.lon, lat, lon) < 1) gpsH = null;

    // Heading fundido: GPS em movimento rápido, bússola parado/devagar
    var heading = getFusedHeading(gpsH, speed);

    // Fallback: bearing calculado entre posições
    if (heading === null) {
        heading = lastPos ? calcBearing(lastPos.lat, lastPos.lon, lat, lon) : smoothHeading;
    }

    lastPos = { lat, lon };

    // Velocímetro
    document.getElementById('speed-value').textContent =
        speed > 0.5 ? Math.round(speed * 3.6) : 0;

    if (isFollowing) {
        map.setView([lat, lon], map.getZoom(), { animate: false });
        updateCarArrow(lat, lon);
        if (!sensorActive) {
            smoothHeading = smoothAngle(smoothHeading, heading, 0.3);
            map.setBearing(smoothHeading);
        }
    }

    var kmh = Math.round(speed * 3.6);
    var src  = (kmh >= 8) ? '🛰️ GPS' : (sensorActive ? '🧭 bússola' : '📍');
    setStatus('🚗', `Navegando · ${kmh} km/h · ${src}`);

    if (destCoords && !routeLine) calculateRoute(lat, lon);

    if (destCoords) {
        var dist = haversine(lat, lon, destCoords[0], destCoords[1]);
        updateDistDisplay(dist);
        if (dist < 30 && !arrivedNotified) { arrivedNotified = true; showToast(); }
    }
}

// ── Loop de bearing suave (usa sensores a ~30fps) ─────────
var bearingRafId = null;

function startBearingLoop() {
    function loop() {
        if (sensorActive && sensorHeading !== null && isFollowing && lastPos) {
            smoothHeading = smoothAngle(smoothHeading, sensorHeading, 0.12);
            map.setBearing(smoothHeading);
            updateCarArrow(lastPos.lat, lastPos.lon);
        }
        bearingRafId = requestAnimationFrame(loop);
    }
    bearingRafId = requestAnimationFrame(loop);
}

function stopBearingLoop() {
    if (bearingRafId) { cancelAnimationFrame(bearingRafId); bearingRafId = null; }
}

function onGPSError(err) {
    var msgs = {1:'Permissão negada.', 2:'Posição indisponível.', 3:'Tempo esgotado.'};
    setStatus('❌', msgs[err.code] || 'Erro de GPS.');
}

// ── Rota (OSRM) ───────────────────────────────────────────
async function calculateRoute(lat, lon) {
    if (!destCoords) return;
    clearRoute();
    setStatus('🔄', 'Calculando rota...');
    try {
        var url  = `https://router.project-osrm.org/route/v1/driving/${lon},${lat};${destCoords[1]},${destCoords[0]}?overview=full&geometries=geojson`;
        var data = await fetch(url).then(r => r.json());
        if (data.code === 'Ok' && data.routes.length > 0) {
            routeLine = L.geoJSON(data.routes[0].geometry, {
                style: { color: '#0a84ff', weight: 7, opacity: 0.88, lineCap: 'round', lineJoin: 'round' }
            }).addTo(map);
            var dist   = data.routes[0].distance;
            var dur    = data.routes[0].duration;
            var durStr = dur < 3600 ? Math.round(dur/60)+' min' : (dur/3600).toFixed(1)+' h';
            setStatus('✅', `Rota: ${(dist/1000).toFixed(1)} km · ${durStr}`);
            updateDistDisplay(dist);
        } else {
            setStatus('⚠️', 'Não foi possível calcular rota.');
        }
    } catch(e) { setStatus('⚠️', 'Erro ao calcular rota.'); }
}

function clearRoute() {
    if (routeLine) { map.removeLayer(routeLine); routeLine = null; }
}

// ── Busca de endereço ─────────────────────────────────────
// Prioridade:
//   1. Google Geocoding API (se chave configurada) — cobertura total BR
//   2. Nominatim estruturado (rua + número separados)
//   3. Photon (índice OSM alternativo)
// O Google é o único que resolve números de imóvel no Brasil com
// precisão. Cadastre uma chave em console.cloud.google.com → 
// APIs & Services → Geocoding API (gratuito até 40.000 req/mês).

// Cole sua chave do Google aqui (ou deixe vazio para usar só OSM):
var GOOGLE_API_KEY = '';

async function searchAddress() {
    var query = document.getElementById('search-input').value.trim();
    if (!query) return;

    var resultsEl = document.getElementById('search-results');
    var statusEl  = document.getElementById('search-status');
    resultsEl.style.display = 'none';
    resultsEl.innerHTML     = '';
    statusEl.style.display  = 'block';
    statusEl.textContent    = 'Buscando...';

    var results = [];

    // ── 1. Google Geocoding (melhor para números no Brasil) ──
    if (GOOGLE_API_KEY) {
        try {
            var gUrl = 'https://maps.googleapis.com/maps/api/geocode/json'
                + '?address=' + encodeURIComponent(query + ', Brasil')
                + '&region=br&language=pt-BR'
                + '&key=' + GOOGLE_API_KEY;
            var gData = await fetch(gUrl).then(r => r.json());
            if (gData.status === 'OK') {
                gData.results.forEach(function(item) {
                    var loc  = item.geometry.location;
                    var comp = item.address_components || [];
                    var get  = function(type) {
                        var c = comp.find(function(x) { return x.types.includes(type); });
                        return c ? c.long_name : '';
                    };
                    results.push({
                        lat: loc.lat, lon: loc.lng,
                        address: {
                            road:         get('route'),
                            house_number: get('street_number'),
                            suburb:       get('sublocality') || get('neighborhood'),
                            city:         get('administrative_area_level_2') || get('locality'),
                            state:        get('administrative_area_level_1')
                        },
                        _formatted: item.formatted_address,
                        _src: 'google'
                    });
                });
            }
        } catch(e) { console.warn('Google geocoding falhou:', e); }
    }

    // ── 2. Nominatim estruturado ──
    var parsed = parseAddressQuery(query);
    if (parsed.number) {
        try {
            var sUrl = 'https://nominatim.openstreetmap.org/search?format=json&addressdetails=1&limit=5&countrycodes=br'
                + '&street=' + encodeURIComponent(parsed.number + ' ' + parsed.street)
                + (parsed.city ? '&city=' + encodeURIComponent(parsed.city) : '')
                + '&state=' + encodeURIComponent(parsed.state || 'Rio Grande do Norte');
            var r1 = await fetch(sUrl, {headers:{'Accept-Language':'pt-BR,pt'}}).then(r => r.json());
            results = results.concat(r1.map(x => ({...x, _src:'nom-struct'})));
        } catch(e) {}
    }

    // ── 3. Nominatim texto livre ──
    try {
        var fUrl = 'https://nominatim.openstreetmap.org/search?format=json&addressdetails=1&limit=5&countrycodes=br&q='
            + encodeURIComponent(query);
        var r2 = await fetch(fUrl, {headers:{'Accept-Language':'pt-BR,pt'}}).then(r => r.json());
        results = results.concat(r2.map(x => ({...x, _src:'nom-free'})));
    } catch(e) {}

    // ── 4. Photon ──
    try {
        var pUrl = 'https://photon.komoot.io/api/?limit=4&lang=pt&q=' + encodeURIComponent(query);
        var r3   = await fetch(pUrl).then(r => r.json());
        if (r3.features) {
            r3.features.forEach(function(f) {
                var p = f.properties || {};
                results.push({
                    lat: f.geometry.coordinates[1], lon: f.geometry.coordinates[0],
                    address: {
                        road:         p.street || p.name || '',
                        house_number: p.housenumber || '',
                        suburb:       p.district || p.suburb || '',
                        city:         p.city || p.town || p.village || '',
                        state:        p.state || ''
                    },
                    _src: 'photon'
                });
            });
        }
    } catch(e) {}

    statusEl.style.display = 'none';

    if (results.length === 0) {
        statusEl.style.display = 'block';
        statusEl.textContent   = 'Nenhum resultado encontrado.';
        return;
    }

    // Deduplicar e ordenar: Google/com número primeiro
    results = deduplicateResults(results);
    results.sort(function(a, b) {
        var score = function(x) {
            var s = 0;
            if (x._src === 'google') s += 10;
            if (x.address && x.address.house_number) s += 5;
            return s;
        };
        return score(b) - score(a);
    });

    resultsEl.style.display = 'block';
    results.slice(0, 7).forEach(function(item) {
        var div  = document.createElement('div');
        div.className = 'sri';
        var addr = item.address || {};

        // Se tiver formatted_address do Google, usa ela como linha 2
        var line1Parts = [];
        if (addr.road)         line1Parts.push(addr.road);
        if (addr.house_number) line1Parts.push(addr.house_number);

        var line2Parts = [];
        if (addr.suburb) line2Parts.push(addr.suburb);
        line2Parts.push(addr.city || '');
        if (addr.state) line2Parts.push(addr.state);

        var line1 = line1Parts.filter(Boolean).join(', ');
        var line2 = item._formatted
            ? item._formatted.replace(', Brasil', '')
            : line2Parts.filter(Boolean).join(', ');

        var srcBadge = item._src === 'google'
            ? '<span style="font-size:10px;color:#0a84ff;font-weight:700;margin-left:4px">Google</span>'
            : '';

        div.innerHTML = '<strong style="display:block;color:#111;font-size:13px">'
            + escHtml(line1 || line2) + srcBadge + '</strong>'
            + (line1 ? '<span style="color:#888;font-size:12px">' + escHtml(line2) + '</span>' : '');

        var lat = parseFloat(item.lat), lon = parseFloat(item.lon);
        div.onclick = function() {
            selectResult(lat, lon, (line1 ? line1 + ' — ' : '') + line2);
        };
        resultsEl.appendChild(div);
    });

    // Se não tem chave Google, sugerir configurar
    if (!GOOGLE_API_KEY && results.every(function(r) { return !r.address || !r.address.house_number; })) {
        var tip = document.createElement('div');
        tip.style.cssText = 'padding:10px 14px;font-size:11px;color:#aaa;border-top:1px solid #f0f0f0';
        tip.textContent = '💡 Para localizar números de imóvel com precisão, configure a chave do Google Maps no código.';
        resultsEl.appendChild(tip);
    }
}

// Tenta separar "Rua X, 123, Cidade" em partes
function parseAddressQuery(q) {
    var numberMatch = q.match(/\b(\d{1,6})\b/);
    var number      = numberMatch ? numberMatch[1] : '';
    var street      = q.replace(/\b\d{1,6}\b/, '').replace(/,\s*,/g, ',').trim().replace(/,\s*$/, '').trim();
    var cityMatch   = street.match(/,\s*([^,]+)$/);
    var city        = cityMatch ? cityMatch[1].trim() : '';
    if (city) street = street.replace(/,\s*[^,]+$/, '').trim();
    return { street, number, city, state: '' };
}

// Remove duplicatas próximas (~50m)
function deduplicateResults(arr) {
    var seen = [];
    return arr.filter(function(item) {
        var lat = parseFloat(item.lat), lon = parseFloat(item.lon);
        if (isNaN(lat) || isNaN(lon)) return false;
        for (var i = 0; i < seen.length; i++) {
            if (haversine(lat, lon, seen[i][0], seen[i][1]) < 50) return false;
        }
        seen.push([lat, lon]);
        return true;
    });
}

function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function selectResult(lat, lon, label) {
    document.getElementById('search-results').style.display = 'none';
    document.getElementById('search-input').value = label;
    destCoords = [lat, lon];
    if (destMarker) map.removeLayer(destMarker);
    destMarker = L.marker(destCoords, {icon: destIcon}).addTo(map);
    clearRoute();
    arrivedNotified = false;
    document.getElementById('route-info').style.display = 'none';
    setStatus('✅', label);
    if (!isNavigating) map.setView([lat, lon], 17, {animate: true});
    else if (lastPos)  calculateRoute(lastPos.lat, lastPos.lon);
}

// ── Utilitários ───────────────────────────────────────────
function calcBearing(lat1, lon1, lat2, lon2) {
    var dLon = (lon2-lon1)*Math.PI/180;
    var φ1 = lat1*Math.PI/180, φ2 = lat2*Math.PI/180;
    var y = Math.sin(dLon)*Math.cos(φ2);
    var x = Math.cos(φ1)*Math.sin(φ2) - Math.sin(φ1)*Math.cos(φ2)*Math.cos(dLon);
    return ((Math.atan2(y,x)*180/Math.PI)+360)%360;
}

function haversine(lat1, lon1, lat2, lon2) {
    var R=6371000, φ1=lat1*Math.PI/180, φ2=lat2*Math.PI/180;
    var dφ=(lat2-lat1)*Math.PI/180, dλ=(lon2-lon1)*Math.PI/180;
    var a=Math.sin(dφ/2)**2+Math.cos(φ1)*Math.cos(φ2)*Math.sin(dλ/2)**2;
    return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function updateDistDisplay(m) {
    document.getElementById('route-info').style.display = 'block';
    document.getElementById('dist-value').textContent =
        m >= 1000 ? (m/1000).toFixed(1)+' km' : Math.round(m)+' m';
}

function setStatus(icon, text) {
    document.getElementById('status-icon').textContent = icon;
    document.getElementById('status-text').textContent  = text;
}

function showToast() {
    document.getElementById('toast').classList.add('show');
    setStatus('🎉', 'Você chegou ao destino!');
}

function dismissToast() {
    document.getElementById('toast').classList.remove('show');
    stopGPS();
}
</script>

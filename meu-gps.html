<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GPS Navigator</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; overflow: hidden; background: #000; }

        #map { height: 100vh; width: 100vw; position: absolute; top: 0; left: 0; z-index: 1; }

        /* ── Seta do carro — fixa na tela, sempre para cima ── */
        #car-arrow {
            position: absolute;
            z-index: 500;
            pointer-events: none;
            transform: translate(-50%, -50%);
            display: none;
        }
        #car-arrow svg { display: block; filter: drop-shadow(0 2px 6px rgba(0,0,0,0.4)); }

        /* ── Painel superior ── */
        #top-bar {
            position: absolute;
            top: 16px; left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            width: calc(100% - 32px);
            max-width: 380px;
            display: flex; flex-direction: column; gap: 10px;
            pointer-events: none;
        }
        #top-bar > * { pointer-events: auto; }

        /* Busca */
        #search-box {
            background: rgba(255,255,255,0.97);
            backdrop-filter: blur(12px);
            border-radius: 14px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.18);
            overflow: hidden;
        }
        #search-row {
            display: flex; align-items: center;
            padding: 4px 4px 4px 14px; gap: 6px;
        }
        #search-input {
            flex: 1; border: none; outline: none;
            font-size: 14px; font-family: inherit;
            color: #111; background: transparent; padding: 8px 0;
        }
        #search-input::placeholder { color: #aaa; }
        #btn-search {
            background: #0a84ff; border: none; border-radius: 10px;
            width: 36px; height: 36px; color: white; font-size: 16px;
            cursor: pointer; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
        }
        #search-results { display: none; border-top: 1px solid #eee; max-height: 200px; overflow-y: auto; }
        .sri {
            padding: 11px 14px; font-size: 13px; color: #222;
            cursor: pointer; border-bottom: 1px solid #f0f0f0; line-height: 1.3;
        }
        .sri:last-child { border-bottom: none; }
        .sri:active { background: #f5f5f5; }
        #search-status { padding: 10px 14px; font-size: 13px; color: #888; display: none; }

        /* Status */
        #status-card {
            background: rgba(255,255,255,0.97);
            backdrop-filter: blur(12px);
            border-radius: 16px; padding: 13px 16px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.18);
            display: flex; align-items: center; gap: 10px;
        }
        #status-icon { font-size: 20px; flex-shrink: 0; }
        #status-text  { font-size: 13px; color: #222; font-weight: 500; line-height: 1.3; }

        .btn {
            border: none; border-radius: 14px; padding: 14px;
            font-size: 15px; font-weight: 700; cursor: pointer;
            color: white; width: 100%;
            transition: transform 0.1s, opacity 0.1s;
        }
        .btn:active { transform: scale(0.97); opacity: 0.9; }
        .btn-blue { background: #0a84ff; box-shadow: 0 4px 16px rgba(10,132,255,0.35); }
        .btn-red  { background: #ff3b30; box-shadow: 0 4px 16px rgba(255,59,48,0.35); display: none; }

        /* ── Painel inferior ── */
        #bottom-bar {
            position: absolute; bottom: 0; left: 0; right: 0;
            z-index: 1000;
            display: flex; align-items: flex-end; justify-content: space-between;
            padding: 0 16px 32px; pointer-events: none;
        }
        .hud-card {
            background: rgba(255,255,255,0.97);
            backdrop-filter: blur(12px);
            border-radius: 16px; padding: 10px 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            text-align: center; pointer-events: auto;
        }
        .hud-value { font-size: 28px; font-weight: 800; color: #111; line-height: 1; font-variant-numeric: tabular-nums; }
        .hud-label { font-size: 10px; color: #999; font-weight: 700; letter-spacing: 1.2px; margin-top: 3px; text-transform: uppercase; }
        #speedometer { min-width: 86px; }
        #route-info  { min-width: 110px; display: none; }

        #btn-center {
            background: rgba(255,255,255,0.97); backdrop-filter: blur(12px);
            border: none; border-radius: 50%; width: 50px; height: 50px;
            font-size: 20px; cursor: pointer;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15); pointer-events: auto;
            transition: transform 0.1s; display: none;
            align-items: center; justify-content: center;
        }
        #btn-center.visible { display: flex; }
        #btn-center:active { transform: scale(0.9); }

        /* Toast */
        #toast {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(0.85);
            z-index: 2000; background: white; border-radius: 22px;
            padding: 32px 40px; text-align: center;
            box-shadow: 0 24px 64px rgba(0,0,0,0.22);
            opacity: 0; pointer-events: none;
            transition: all 0.35s cubic-bezier(.34,1.56,.64,1);
        }
        #toast.show { opacity: 1; transform: translate(-50%, -50%) scale(1); pointer-events: auto; }
        #toast h2 { font-size: 26px; margin-bottom: 6px; }
        #toast p  { color: #666; font-size: 14px; margin-bottom: 20px; }
        #toast button {
            background: #0a84ff; color: white; border: none;
            border-radius: 12px; padding: 13px 32px;
            font-size: 15px; font-weight: 700; cursor: pointer;
        }

        .leaflet-control-zoom { display: none !important; }
    </style>
</head>
<body>

<div id="map"></div>

<!-- Seta fixa na tela (nunca gira) -->
<div id="car-arrow">
    <svg width="52" height="52" viewBox="0 0 52 52">
        <circle cx="26" cy="26" r="24" fill="white" stroke="#0a84ff" stroke-width="2.5"/>
        <polygon points="26,10 16,40 26,32 36,40" fill="#0a84ff"/>
    </svg>
</div>

<!-- UI (nunca gira) -->
<div id="top-bar">
    <div id="search-box">
        <div id="search-row">
            <input id="search-input" type="text" placeholder="Buscar endereço com número..." autocomplete="off"
                onkeydown="if(event.key==='Enter') searchAddress()" />
            <button id="btn-search" onclick="searchAddress()">🔍</button>
        </div>
        <div id="search-status"></div>
        <div id="search-results"></div>
    </div>
    <div id="status-card">
        <span id="status-icon">🗺️</span>
        <span id="status-text">Busque um endereço ou toque no mapa</span>
    </div>
    <button id="btn-start" class="btn btn-blue" onclick="startGPS()">▶ INICIAR NAVEGAÇÃO</button>
    <button id="btn-stop"  class="btn btn-red"  onclick="stopGPS()">⏹ PARAR NAVEGAÇÃO</button>
</div>

<div id="bottom-bar">
    <div id="speedometer" class="hud-card">
        <div class="hud-value" id="speed-value">0</div>
        <div class="hud-label">km/h</div>
    </div>
    <button id="btn-center" onclick="resumeFollow()">📍</button>
    <div id="route-info" class="hud-card">
        <div class="hud-value" id="dist-value">—</div>
        <div class="hud-label">do destino</div>
    </div>
</div>

<div id="toast">
    <h2>🎉 Chegou!</h2>
    <p>Você chegou ao seu destino.</p>
    <button onclick="dismissToast()">OK</button>
</div>

<!-- Leaflet core -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!--
  Leaflet.Rotate — rotaciona bearing do mapa nativamente.
  setBearing(graus) gira os tiles, labels e rota como um GPS real:
  - labels ficam sempre legíveis (o plugin contra-rotaciona o texto)
  - gestos de toque funcionam normalmente
  - sem distorção de cantos
-->
<script src="https://unpkg.com/leaflet-rotate@0.2.8/dist/leaflet-rotate-src.js"></script>

<script>
// ── Mapa com suporte a rotate ──────────────────────────────
var map = L.map('map', {
    rotate: true,           // ativa o plugin leaflet-rotate
    bearing: 0,             // norte para cima no início
    zoomControl: false,
    fadeAnimation: false
}).setView([-5.7945, -35.2110], 16);

L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; OpenStreetMap &copy; CARTO',
    subdomains: 'abcd',
    maxZoom: 22, minZoom: 3
}).addTo(map);

// ── Estado ────────────────────────────────────────────────
var destMarker      = null;
var destCoords      = null;
var routeLine       = null;
var watchId         = null;
var isNavigating    = false;
var isFollowing     = true;
var lastPos         = null;
var lastHeading     = 0;
var arrivedNotified = false;
var carArrowEl      = document.getElementById('car-arrow');

// ── Sensores de orientação (giroscópio + magnetômetro) ────
// O S23 fornece heading via DeviceOrientationEvent.
// "webkitCompassHeading" é o azimute magnético (0=Norte, 90=Leste)
// já compensado pelo giroscópio — muito mais suave que GPS.heading.
// Em Android, usamos alpha com correção de declinação.
var sensorHeading    = null;   // heading vindo dos sensores
var sensorActive     = false;
var orientationAlpha = null;   // última leitura bruta
var compassOffset    = 0;      // correção para transformar alpha em azimute

function startSensors() {
    // iOS 13+ exige permissão explícita
    if (typeof DeviceOrientationEvent !== 'undefined' &&
        typeof DeviceOrientationEvent.requestPermission === 'function') {
        DeviceOrientationEvent.requestPermission()
            .then(function(state) {
                if (state === 'granted') bindOrientation();
            })
            .catch(console.error);
    } else {
        // Android / outros — sem necessidade de permissão
        bindOrientation();
    }
}

function bindOrientation() {
    // Preferir "deviceorientationabsolute" (mais preciso, norte magnético real)
    // Fallback para "deviceorientation" se não disponível
    var evtAbsolute = 'ondeviceorientationabsolute' in window;
    window.addEventListener(
        evtAbsolute ? 'deviceorientationabsolute' : 'deviceorientation',
        onOrientation, true
    );
}

function onOrientation(e) {
    // webkitCompassHeading: disponível no iOS, já é azimute correto
    if (e.webkitCompassHeading !== undefined && e.webkitCompassHeading !== null) {
        sensorHeading = e.webkitCompassHeading;
        sensorActive  = true;
        return;
    }

    // Android: e.alpha = rotação em torno do eixo Z em graus [0-360]
    // absolute=true significa já referenciado ao norte magnético
    if (e.alpha !== null && e.alpha !== undefined) {
        orientationAlpha = e.alpha;
        // alpha=0 no Android costuma ser norte quando absolute=true
        // Converter para azimute: azimute = (360 - alpha) % 360
        sensorHeading = (360 - e.alpha + compassOffset) % 360;
        sensorActive  = true;
    }
}

// Filtro de suavização exponencial para evitar tremido
var smoothHeading = 0;
function smoothAngle(current, target, factor) {
    // Interpola pelo caminho mais curto no círculo
    var diff = ((target - current + 540) % 360) - 180;
    return (current + diff * factor + 360) % 360;
}

// ── Ícone de destino ──────────────────────────────────────
var destIcon = L.divIcon({
    className: '',
    html: '<div style="font-size:30px;line-height:1">📍</div>',
    iconSize: [30, 34], iconAnchor: [15, 34]
});

// ── Posicionar seta na tela ───────────────────────────────
// O plugin cuida da rotação do mapa; a seta fica fixa na
// posição de pixel correspondente ao carro, sempre para cima.
function updateCarArrow(lat, lon) {
    var pt = map.latLngToContainerPoint([lat, lon]);
    carArrowEl.style.left    = pt.x + 'px';
    carArrowEl.style.top     = pt.y + 'px';
    carArrowEl.style.display = 'block';
}

// ── Definir destino (clique no mapa) ──────────────────────
map.on('click', function(e) {
    destCoords = [e.latlng.lat, e.latlng.lng];
    if (destMarker) map.removeLayer(destMarker);
    destMarker = L.marker(destCoords, {icon: destIcon}).addTo(map);
    clearRoute();
    arrivedNotified = false;
    document.getElementById('route-info').style.display = 'none';
    setStatus('✅', 'Destino marcado! Toque em Iniciar.');
    if (isNavigating && lastPos) calculateRoute(lastPos.lat, lastPos.lon);
});

map.on('dragstart', function() {
    isFollowing = false;
    document.getElementById('btn-center').classList.add('visible');
});

// ── GPS ───────────────────────────────────────────────────
function startGPS() {
    if (!navigator.geolocation) return alert('GPS não disponível.');
    isNavigating = true; isFollowing = true; arrivedNotified = false;
    document.getElementById('btn-start').style.display = 'none';
    document.getElementById('btn-stop').style.display  = 'block';
    setStatus('📡', 'Aguardando sinal GPS...');

    // Ativar sensores de orientação (giroscópio/magnetômetro)
    startSensors();

    watchId = navigator.geolocation.watchPosition(onPosition, onGPSError, {
        enableHighAccuracy: true, timeout: 15000, maximumAge: 0
    });

    // Loop de atualização suave do bearing (~30fps)
    // Atualiza o mapa com o heading dos sensores continuamente,
    // não só quando o GPS devolve posição (que é lento, 1-2s)
    startBearingLoop();
}

function stopGPS() {
    isNavigating = false;
    if (watchId) { navigator.geolocation.clearWatch(watchId); watchId = null; }
    stopBearingLoop();
    window.removeEventListener('deviceorientationabsolute', onOrientation, true);
    window.removeEventListener('deviceorientation',         onOrientation, true);
    sensorActive = false; sensorHeading = null;
    map.setBearing(0);
    carArrowEl.style.display = 'none';
    document.getElementById('btn-stop').style.display  = 'none';
    document.getElementById('btn-start').style.display = 'block';
    document.getElementById('btn-center').classList.remove('visible');
    document.getElementById('speed-value').textContent = '0';
    document.getElementById('route-info').style.display = 'none';
    clearRoute();
    lastPos = null;
    setStatus('🗺️', 'Busque um endereço ou toque no mapa');
}

function resumeFollow() {
    isFollowing = true;
    document.getElementById('btn-center').classList.remove('visible');
    if (lastPos) {
        map.setView([lastPos.lat, lastPos.lon], map.getZoom(), {animate: true});
        map.setBearing(lastHeading);
        updateCarArrow(lastPos.lat, lastPos.lon);
    }
}

// ── Callback GPS ──────────────────────────────────────────
function onPosition(pos) {
    var lat   = pos.coords.latitude;
    var lon   = pos.coords.longitude;
    var speed = pos.coords.speed;

    // Fusão de sensores:
    // - Se giroscópio/magnetômetro estiver ativo: usa ele (suave, ~30Hz)
    // - Se não: tenta heading do GPS
    // - Fallback: bearing calculado entre duas posições
    var heading;
    if (sensorActive && sensorHeading !== null) {
        heading = sensorHeading; // mais preciso e suave
    } else if (pos.coords.heading !== null && !isNaN(pos.coords.heading)) {
        heading = pos.coords.heading;
    } else {
        heading = lastPos ? calcBearing(lastPos.lat, lastPos.lon, lat, lon) : lastHeading;
    }

    // Anti-jitter: se parado, mantém último heading
    if (lastPos && haversine(lastPos.lat, lastPos.lon, lat, lon) < 2 && !sensorActive) {
        heading = lastHeading;
    }

    lastHeading = heading;
    lastPos     = { lat, lon };

    // Velocímetro
    document.getElementById('speed-value').textContent =
        (speed && speed > 0.5) ? Math.round(speed * 3.6) : 0;

    if (isFollowing) {
        map.setView([lat, lon], map.getZoom(), { animate: false });
        updateCarArrow(lat, lon);
        // O bearing loop já aplica setBearing continuamente via sensores
        if (!sensorActive) {
            smoothHeading = smoothAngle(smoothHeading, heading, 0.3);
            map.setBearing(smoothHeading);
        }
    }

    if (lastPos && !document.getElementById('btn-stop').style.display === 'none') {
        setStatus('🚗', 'GPS ativo — navegando');
    }

    if (destCoords && !routeLine) calculateRoute(lat, lon);

    if (destCoords) {
        var dist = haversine(lat, lon, destCoords[0], destCoords[1]);
        updateDistDisplay(dist);
        if (dist < 30 && !arrivedNotified) { arrivedNotified = true; showToast(); }
    }
}

// ── Loop de bearing suave (usa sensores a ~30fps) ─────────
var bearingRafId = null;

function startBearingLoop() {
    function loop() {
        if (sensorActive && sensorHeading !== null && isFollowing && lastPos) {
            smoothHeading = smoothAngle(smoothHeading, sensorHeading, 0.12);
            map.setBearing(smoothHeading);
            updateCarArrow(lastPos.lat, lastPos.lon);
        }
        bearingRafId = requestAnimationFrame(loop);
    }
    bearingRafId = requestAnimationFrame(loop);
}

function stopBearingLoop() {
    if (bearingRafId) { cancelAnimationFrame(bearingRafId); bearingRafId = null; }
}

function onGPSError(err) {
    var msgs = {1:'Permissão negada.', 2:'Posição indisponível.', 3:'Tempo esgotado.'};
    setStatus('❌', msgs[err.code] || 'Erro de GPS.');
}

// ── Rota (OSRM) ───────────────────────────────────────────
async function calculateRoute(lat, lon) {
    if (!destCoords) return;
    clearRoute();
    setStatus('🔄', 'Calculando rota...');
    try {
        var url  = `https://router.project-osrm.org/route/v1/driving/${lon},${lat};${destCoords[1]},${destCoords[0]}?overview=full&geometries=geojson`;
        var data = await fetch(url).then(r => r.json());
        if (data.code === 'Ok' && data.routes.length > 0) {
            routeLine = L.geoJSON(data.routes[0].geometry, {
                style: { color: '#0a84ff', weight: 7, opacity: 0.88, lineCap: 'round', lineJoin: 'round' }
            }).addTo(map);
            var dist   = data.routes[0].distance;
            var dur    = data.routes[0].duration;
            var durStr = dur < 3600 ? Math.round(dur/60)+' min' : (dur/3600).toFixed(1)+' h';
            setStatus('✅', `Rota: ${(dist/1000).toFixed(1)} km · ${durStr}`);
            updateDistDisplay(dist);
        } else {
            setStatus('⚠️', 'Não foi possível calcular rota.');
        }
    } catch(e) { setStatus('⚠️', 'Erro ao calcular rota.'); }
}

function clearRoute() {
    if (routeLine) { map.removeLayer(routeLine); routeLine = null; }
}

// ── Busca de endereço ─────────────────────────────────────
// Estratégia em cascata:
// 1. Nominatim estruturado (rua + número separados) — mais preciso para números
// 2. Nominatim texto livre — fallback
// 3. Photon (índice OSM diferente, boa cobertura BR) — segundo fallback
// Os três rodam em paralelo e os resultados são mesclados,
// priorizando os que têm house_number confirmado.

async function searchAddress() {
    var query = document.getElementById('search-input').value.trim();
    if (!query) return;

    var resultsEl = document.getElementById('search-results');
    var statusEl  = document.getElementById('search-status');
    resultsEl.style.display = 'none';
    resultsEl.innerHTML     = '';
    statusEl.style.display  = 'block';
    statusEl.textContent    = 'Buscando...';

    try {
        // Tentar extrair número do endereço digitado
        // Ex: "Rua das Flores 123 Natal" → street="Rua das Flores", number="123", city="Natal"
        var parsed   = parseAddressQuery(query);
        var results  = [];

        // Busca 1: Nominatim estruturado (street + housenumber separados)
        // Muito mais preciso para localizar número exato
        if (parsed.number) {
            try {
                var structUrl = 'https://nominatim.openstreetmap.org/search?format=json&addressdetails=1&limit=5&countrycodes=br'
                    + '&street=' + encodeURIComponent(parsed.number + ' ' + parsed.street)
                    + (parsed.city ? '&city=' + encodeURIComponent(parsed.city) : '')
                    + '&state=' + encodeURIComponent(parsed.state || 'Rio Grande do Norte');
                var r1 = await fetch(structUrl, {headers:{'Accept-Language':'pt-BR,pt'}}).then(r => r.json());
                results = results.concat(r1.map(x => ({...x, _src: 'structured'})));
            } catch(e) {}
        }

        // Busca 2: Nominatim texto livre (sempre roda)
        try {
            var freeUrl = 'https://nominatim.openstreetmap.org/search?format=json&addressdetails=1&limit=6&countrycodes=br&q='
                        + encodeURIComponent(query);
            var r2 = await fetch(freeUrl, {headers:{'Accept-Language':'pt-BR,pt'}}).then(r => r.json());
            results = results.concat(r2.map(x => ({...x, _src: 'free'})));
        } catch(e) {}

        // Busca 3: Photon — índice OSM independente, boa cobertura BR
        try {
            var photonUrl = 'https://photon.komoot.io/api/?limit=5&lang=pt&q='
                          + encodeURIComponent(query);
            var r3 = await fetch(photonUrl).then(r => r.json());
            if (r3.features) {
                r3.features.forEach(function(f) {
                    var p = f.properties || {};
                    results.push({
                        lat: f.geometry.coordinates[1],
                        lon: f.geometry.coordinates[0],
                        address: {
                            road:         p.street || p.name || '',
                            house_number: p.housenumber || '',
                            suburb:       p.district || p.suburb || '',
                            city:         p.city || p.town || p.village || '',
                            state:        p.state || ''
                        },
                        _src: 'photon'
                    });
                });
            }
        } catch(e) {}

        statusEl.style.display = 'none';

        if (results.length === 0) {
            statusEl.style.display = 'block';
            statusEl.textContent   = 'Nenhum resultado encontrado.';
            return;
        }

        // Deduplicar por proximidade (~50m) e ordenar:
        // primeiro os que têm número confirmado
        results = deduplicateResults(results);
        results.sort(function(a, b) {
            var aHasNum = !!(a.address && a.address.house_number);
            var bHasNum = !!(b.address && b.address.house_number);
            return (bHasNum ? 1 : 0) - (aHasNum ? 1 : 0);
        });

        resultsEl.style.display = 'block';
        results.slice(0, 7).forEach(function(item) {
            var div  = document.createElement('div');
            div.className = 'sri';
            var addr = item.address || {};

            var line1Parts = [];
            if (addr.road)         line1Parts.push(addr.road);
            if (addr.house_number) line1Parts.push(addr.house_number);

            var line2Parts = [];
            if (addr.suburb) line2Parts.push(addr.suburb);
            line2Parts.push(addr.city || addr.town || addr.village || '');
            if (addr.state) line2Parts.push(addr.state);

            var line1 = line1Parts.filter(Boolean).join(', ');
            var line2 = line2Parts.filter(Boolean).join(', ');

            if (line1) {
                div.innerHTML = '<strong style="display:block;color:#111;font-size:13px">'
                    + escHtml(line1) + '</strong>'
                    + '<span style="color:#888;font-size:12px">' + escHtml(line2) + '</span>';
            } else {
                div.textContent = item.display_name || line2;
            }

            var lat = parseFloat(item.lat), lon = parseFloat(item.lon);
            div.onclick = function() {
                selectResult(lat, lon, (line1 ? line1 + ', ' : '') + line2);
            };
            resultsEl.appendChild(div);
        });

    } catch(e) {
        statusEl.style.display = 'block';
        statusEl.textContent   = 'Erro ao buscar endereço.';
    }
}

// Tenta separar "Rua X, 123, Cidade" em partes
function parseAddressQuery(q) {
    var numberMatch = q.match(/\b(\d{1,6})\b/);
    var number      = numberMatch ? numberMatch[1] : '';
    var street      = q.replace(/\b\d{1,6}\b/, '').replace(/,\s*,/g, ',').trim().replace(/,\s*$/, '').trim();

    // Tentar detectar cidade após vírgula ou ao final
    var cityMatch = street.match(/,\s*([^,]+)$/);
    var city      = cityMatch ? cityMatch[1].trim() : '';
    if (city) street = street.replace(/,\s*[^,]+$/, '').trim();

    return { street: street, number: number, city: city, state: '' };
}

// Remove duplicatas muito próximas (~50m)
function deduplicateResults(arr) {
    var seen = [];
    return arr.filter(function(item) {
        var lat = parseFloat(item.lat), lon = parseFloat(item.lon);
        if (isNaN(lat) || isNaN(lon)) return false;
        for (var i = 0; i < seen.length; i++) {
            if (haversine(lat, lon, seen[i][0], seen[i][1]) < 50) return false;
        }
        seen.push([lat, lon]);
        return true;
    });
}

function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function selectResult(lat, lon, label) {
    document.getElementById('search-results').style.display = 'none';
    document.getElementById('search-input').value = label;
    destCoords = [lat, lon];
    if (destMarker) map.removeLayer(destMarker);
    destMarker = L.marker(destCoords, {icon: destIcon}).addTo(map);
    clearRoute();
    arrivedNotified = false;
    document.getElementById('route-info').style.display = 'none';
    setStatus('✅', label);
    if (!isNavigating) map.setView([lat, lon], 17, {animate: true});
    else if (lastPos)  calculateRoute(lastPos.lat, lastPos.lon);
}

// ── Utilitários ───────────────────────────────────────────
function calcBearing(lat1, lon1, lat2, lon2) {
    var dLon = (lon2-lon1)*Math.PI/180;
    var φ1 = lat1*Math.PI/180, φ2 = lat2*Math.PI/180;
    var y = Math.sin(dLon)*Math.cos(φ2);
    var x = Math.cos(φ1)*Math.sin(φ2) - Math.sin(φ1)*Math.cos(φ2)*Math.cos(dLon);
    return ((Math.atan2(y,x)*180/Math.PI)+360)%360;
}

function haversine(lat1, lon1, lat2, lon2) {
    var R=6371000, φ1=lat1*Math.PI/180, φ2=lat2*Math.PI/180;
    var dφ=(lat2-lat1)*Math.PI/180, dλ=(lon2-lon1)*Math.PI/180;
    var a=Math.sin(dφ/2)**2+Math.cos(φ1)*Math.cos(φ2)*Math.sin(dλ/2)**2;
    return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function updateDistDisplay(m) {
    document.getElementById('route-info').style.display = 'block';
    document.getElementById('dist-value').textContent =
        m >= 1000 ? (m/1000).toFixed(1)+' km' : Math.round(m)+' m';
}

function setStatus(icon, text) {
    document.getElementById('status-icon').textContent = icon;
    document.getElementById('status-text').textContent  = text;
}

function showToast() {
    document.getElementById('toast').classList.add('show');
    setStatus('🎉', 'Você chegou ao destino!');
}

function dismissToast() {
    document.getElementById('toast').classList.remove('show');
    stopGPS();
}

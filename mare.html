<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Marés Búzios">
    <meta name="theme-color" content="#1e3c72">
    <title>Marés - Praia de Búzios/RN</title>
    <link rel="manifest" href="manifest.json">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            min-height: 100vh;
            min-height: -webkit-fill-available;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            padding-top: env(safe-area-inset-top, 20px);
            padding-bottom: env(safe-area-inset-bottom, 20px);
        }
        .close-btn {
            position: fixed;
            top: calc(12px + env(safe-area-inset-top, 0px));
            right: 12px;
            width: 36px;
            height: 36px;
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(0,0,0,0.15);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 9999;
            color: #000000;
            font-size: 18px;
            font-weight: bold;
            line-height: 1;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
            transition: background 0.2s;
        }
        .close-btn:hover { background: rgba(255,255,255,1); }
        .install-btn {
            position: fixed !important;
            top: 12px !important;
            left: 12px !important;
            width: 36px !important;
            height: 36px !important;
            background: rgba(255,255,255,0.9) !important;
            border: 1px solid rgba(0,0,0,0.15) !important;
            border-radius: 50% !important;
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
            cursor: pointer !important;
            z-index: 99999 !important;
            font-size: 18px !important;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3) !important;
            visibility: visible !important;
            opacity: 1 !important;
        }
        .install-btn:hover { background: rgba(255,255,255,1) !important; }


        .container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }
        h1 { text-align: center; color: #1e3c72; margin-bottom: 10px; font-size: 24px; }
        .subtitle { text-align: center; color: #666; margin-bottom: 30px; font-size: 14px; }
        
        /* --- RELÓGIO DE MARÉS --- */
        .tide-clock-container {
            position: relative;
            width: 280px;
            height: 360px; /* aumentado para acomodar labels em cima e embaixo */
            margin: 0 auto 30px;
        }

        /* Textos ao redor do relógio */
        .clock-label {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            font-weight: bold;
            font-size: 14px;
            white-space: nowrap;
            z-index: 10;
        }

        .label-top {
            top: 0;
            color: #1e3c72;
        }
        .label-top .time {
            display: block;
            font-size: 20px;
            margin-top: 2px;
        }

        .label-bottom {
            bottom: 0;
            color: #d32f2f;
        }
        .label-bottom .time {
            display: block;
            font-size: 20px;
            margin-top: 2px;
        }

        .label-side {
            top: 50%;
            transform: translateY(-50%);
            font-size: 16px;
            text-transform: uppercase;
            font-weight: 600;
        }
        .label-left {
            left: 0;
            top: 180px; /* centro do círculo: top(50px) + altura(260px)/2 */
            transform: translateX(0) translateY(-50%);
            color: #1976D2;
        }
        .label-right {
            right: 0;
            left: auto;
            top: 180px;
            transform: translateY(-50%);
            color: #d32f2f;
        }

        /* O Círculo Gráfico */
        .tide-clock {
            position: absolute;
            top: 50px;
            left: 0;
            width: 100%;
            height: 260px;
        }
        .tide-clock svg {
            width: 100%;
            height: 100%;
        }
        
        /* --- INFORMAÇÕES ABAIXO --- */
        .tide-info { text-align: center; margin-bottom: 20px; }
        .tide-status { font-size: 24px; font-weight: bold; margin-bottom: 10px; }
        .tide-status.rising { color: #4CAF50; }
        .tide-status.falling { color: #f44336; }
        .tide-time { font-size: 16px; color: #666; }
        
        .next-tide {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 20px;
        }
        .next-tide-label { font-size: 14px; color: #666; margin-bottom: 5px; }
        .next-tide-time { font-size: 22px; font-weight: bold; color: #1e3c72; }
        
        .marées {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }
        .marée-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #f0f0f0;
        }
        .marée-item:last-child { border-bottom: none; }
        .marée-type { font-weight: bold; }
        .marée-type.high { color: #4CAF50; }
        .marée-type.low { color: #f44336; }
        
        .data-info {
            background: #d4edda;
            padding: 10px;
            border-radius: 5px;
            margin-top: 15px;
            font-size: 11px;
            color: #155724;
            text-align: center;
            line-height: 1.4;
        }
        
        .loading, .error { text-align: center; padding: 40px; }
        .error { color: #f44336; }
    </style>
    <script>
        // PWA install

        window._deferredPrompt = null;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            window._deferredPrompt = e;
        });
        window.addEventListener('appinstalled', () => {
            document.getElementById('installBtn').style.display = 'none';
            window._deferredPrompt = null;
        });

        // Tela cheia ao primeiro toque
        function requestFullscreen() {
            const el = document.documentElement;
            if (el.requestFullscreen) el.requestFullscreen();
            else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
            else if (el.mozRequestFullScreen) el.mozRequestFullScreen();
            else if (el.msRequestFullscreen) el.msRequestFullscreen();
        }
        document.addEventListener('DOMContentLoaded', () => {
            setTimeout(requestFullscreen, 300);
        });
        document.addEventListener('touchstart', requestFullscreen, { once: true });
        document.addEventListener('click', requestFullscreen, { once: true });
    </script>
</head>
<body>
    <button class="close-btn" onclick="exitApp()" title="Fechar">✕</button>
    <button class="install-btn" id="installBtn" onclick="installApp()" title="Instalar app">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 3v13M7 11l5 5 5-5M4 20h16"/>
        </svg>
    </button>
    <script>
        function exitApp() {
            if (document.exitFullscreen) document.exitFullscreen();
            else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
            setTimeout(() => window.close(), 200);
        }
        function installApp() {
            if (window._deferredPrompt) {
                window._deferredPrompt.prompt();
                window._deferredPrompt.userChoice.then((choice) => {
                    window._deferredPrompt = null;
                    if (choice.outcome === 'accepted') {
                        document.getElementById('installBtn').style.display = 'none';
                    }
                });
            } else {
                alert('Para instalar:\nMenu do Chrome (⋮) → "Adicionar à tela inicial"');
            }
        }
    </script>
